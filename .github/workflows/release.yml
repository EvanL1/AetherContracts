name: release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  verify-and-release:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1
        with:
          fetch-depth: 0
      - uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v5.0.0
        with:
          version: 11.11.0
      - uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5.0.0
        with:
          node-version: 24
          cache: pnpm
      - run: rustup toolchain install 1.92.0 --profile minimal --component clippy,rustfmt
      - run: rustup default 1.92.0
      - run: pnpm install --frozen-lockfile
      - run: node scripts/check-release-tag.mjs
      - run: pnpm check
      - run: pnpm test:coverage
      - run: pnpm check:c:sanitize
      - run: pnpm audit
      - name: Build immutable source bundle and checksums
        shell: bash
        run: |
          set -euo pipefail
          tag="${GITHUB_REF_NAME}"
          version="${tag#v}"
          bundle="AetherContracts-${version}.tar.gz"
          git archive --format=tar --prefix="AetherContracts-${version}/" "${tag}" | gzip -n > "${bundle}"
          sha256sum "${bundle}" contract-manifest.json > SHA256SUMS
          echo "BUNDLE=${bundle}" >> "${GITHUB_ENV}"
      - name: Publish prerelease
        env:
          GH_TOKEN: ${{ github.token }}
        run: >-
          gh release create "${GITHUB_REF_NAME}"
          "${BUNDLE}" SHA256SUMS contract-manifest.json
          --verify-tag --prerelease --generate-notes
          --title "AetherContracts ${GITHUB_REF_NAME}"
